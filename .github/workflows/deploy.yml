name: Penantia n8n — Deploy to HF Space

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "penantiaglobal@gmail.com"
          git config --global user.name "Penantia AI"
          git remote add hf https://penantiaglobal:$HF_TOKEN@huggingface.co/spaces/penantiaglobal/penantia-n8n || true
          git push hf main --force

      - name: Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMIT_SHA: ${{ github.event.head_commit.id }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          STATUS: ${{ job.status }}
        run: |
          ICON="✅"
          if [ "$STATUS" != "success" ]; then ICON="❌"; fi
          AEST=$(TZ='Australia/Sydney' date '+%H:%M AEST')
          SHORT_SHA="${COMMIT_SHA:0:7}"
          MSG="${ICON} Penantia n8n deployed | ${SHORT_SHA} | ${COMMIT_MSG} | ${AEST}"
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            --max-time 10 || true
