name: Penantia n8n — Deploy to HF Space

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -x
          echo "Token length: ${#HF_TOKEN}"
          git config user.email "penantiaglobal@gmail.com"
          git config user.name "Penantia AI"
          git remote remove hf 2>/dev/null || true
          git remote add hf https://penantiaglobal:${HF_TOKEN}@huggingface.co/spaces/penantiaglobal/penantia-n8n
          git remote -v
          git log --oneline -3
          git push hf HEAD:main --force 2>&1
          echo "Push exit code: $?"

      - name: Telegram
        if: always()
        env:
          BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ job.status }}
        run: |
          MSG="${STATUS}: penantia-n8n - $(git log -1 --pretty=%h) $(git log -1 --pretty=%s)"
          curl -s "https://api.telegram.org/bot${BOT}/sendMessage" --data-urlencode "chat_id=${CHAT}" --data-urlencode "text=${MSG}" --max-time 10 || true
