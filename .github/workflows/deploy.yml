name: Penantia n8n — Deploy to HF Space

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "penantiaglobal@gmail.com"
          git config user.name "Penantia AI"
          git remote remove hf 2>/dev/null || true
          git remote add hf https://penantiaglobal:${HF_TOKEN}@huggingface.co/spaces/penantiaglobal/penantia-n8n
          git push hf HEAD:main --force

      - name: Wait for n8n to start
        run: |
          echo "Waiting for n8n..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://penantiaglobal-penantia-n8n.hf.space/healthz)
            if [ "$STATUS" = "200" ]; then echo "n8n up after $i attempts"; break; fi
            echo "Attempt $i: $STATUS — waiting 10s..."
            sleep 10
          done

      - name: Setup owner and import all workflows
        run: |
          BASE="https://penantiaglobal-penantia-n8n.hf.space"
          EMAIL="penantiaglobal@gmail.com"
          PASS="Penantia2026!"
          COOKIE_JAR=$(mktemp)

          # Setup owner (idempotent)
          curl -s -c "$COOKIE_JAR" -X POST "$BASE/rest/owner/setup" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$EMAIL\",\"firstName\":\"Penantia\",\"lastName\":\"AI\",\"password\":\"$PASS\"}" \
            > /dev/null 2>&1 || true

          # Login
          curl -s -c "$COOKIE_JAR" -X POST "$BASE/rest/login" \
            -H "Content-Type: application/json" \
            -d "{\"emailOrLdapLoginId\":\"$EMAIL\",\"password\":\"$PASS\"}" > /dev/null

          # Check existing
          EXISTING=$(curl -s -b "$COOKIE_JAR" "$BASE/rest/workflows" \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); print(len(d.get("data",[])))' 2>/dev/null || echo "0")
          echo "Existing workflows: $EXISTING"

          if [ "$EXISTING" = "0" ] || [ -z "$EXISTING" ]; then
            echo "Importing all 5 workflows..."
            for WF_FILE in workflows/auto_test.json workflows/self_heal.json workflows/seo_intelligence.json workflows/blog_queue.json workflows/daily_summary.json; do
              RESP=$(curl -s -b "$COOKIE_JAR" -X POST "$BASE/rest/workflows" \
                -H "Content-Type: application/json" \
                -d @$WF_FILE)
              WF_ID=$(echo $RESP | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d.get("data",{}).get("id","?"))' 2>/dev/null)
              echo "Created $WF_FILE: $WF_ID"
              if [ "$WF_ID" != "?" ] && [ -n "$WF_ID" ]; then
                curl -s -b "$COOKIE_JAR" -X PATCH "$BASE/rest/workflows/$WF_ID" \
                  -H "Content-Type: application/json" \
                  -d '{"active":true}' > /dev/null
                echo "  Activated $WF_ID"
              fi
            done
            echo "All workflows imported and activated"
          else
            echo "Workflows exist — skipping import"
          fi

      - name: Telegram notification
        if: always()
        env:
          BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ job.status }}
        run: |
          ICON="✅"
          [ "$STATUS" != "success" ] && ICON="❌"
          MSG="$ICON Penantia n8n | $(git log -1 --pretty=%h) | $(git log -1 --pretty=%s) | $(TZ='Australia/Sydney' date '+%H:%M AEST')"
          curl -s "https://api.telegram.org/bot${BOT}/sendMessage" \
            --data-urlencode "chat_id=${CHAT}" \
            --data-urlencode "text=${MSG}" \
            --max-time 10 || true
